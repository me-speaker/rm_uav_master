# /etc/logrotate.d/uav  (host 端, systemd timer 每天调用)
# UAVSLAM 飞行日志滚动 — 保留 7 天, 每天压缩

/var/log/uav/launch-*.log {
    daily                    # 每天滚动
    rotate 7                 # 保留 7 天
    compress                 # gzip 旧文件
    delaycompress            # 昨天的文件才压缩 (今天的可读)
    missingok                # 文件不存在不报错
    notifempty               # 空文件不滚动
    copytruncate             # 保留原文件, truncate (launch 进程不会因为 log rotate 死)
    dateext                  # 加 .YYYYMMDD 后缀
    dateformat -%Y%m%d      # date 格式
}