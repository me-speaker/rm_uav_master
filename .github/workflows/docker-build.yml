name: docker-build

on:
  push:
    branches: [master, main]
    # paths 过滤: 改 dockerfile/scripts/CI 才 build, 改 docs 不 build
    paths:
      - 'Dockerfile.uav'
      - 'Dockerfile.uav.build'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/docker-build.yml'
    tags:
      - 'v*'
  workflow_dispatch:

# 必需权限: 默认 GITHUB_TOKEN 只 read packages, 不能 push image
# 显式给 packages: write 才能 push 到 ghcr.io
permissions:
  contents: read
  packages: write

jobs:
  # ============================================================================
  # 1. build-runtime: dev 端 runtime 镜像 (drone 用, runtime-only 精简)
  # ============================================================================
  build-runtime:
    name: build ega-uav:runtime
    runs-on: ubuntu-latest
    outputs:
      runtime-tag: ${{ steps.meta.outputs.runtime-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (runtime image tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ega-uav-runtime
          tags: |
            # 短 SHA
            type=sha,format=short
            # master-stable (默认分支)
            type=raw,value=runtime-v1.0-stable
            # tag v* 触发: 用 tag 名
            type=semver,pattern={{version}}
            # master push: latest
            type=raw,value=latest

      - name: Build and push runtime image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.uav
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            ROS_APT_MIRROR=tsinghua

      - name: Image digest
        if: steps.meta.outputs.digest
        run: |
          echo "Runtime image pushed: ghcr.io/${{ github.repository_owner }}/ega-uav-runtime@${{ steps.meta.outputs.digest }}"

  # ============================================================================
  # 2. build-dev: FROM build-runtime 复用 runtime layer (节省 build time)
  # ============================================================================
  build-dev:
    name: build ega-uav:build (from runtime)
    needs: build-runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (dev image tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ega-uav-build
          tags: |
            # 短 SHA
            type=sha,format=short
            # master-stable
            type=raw,value=build-v1.0-stable
            # tag v*
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push dev image (FROM runtime image, multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.uav.build
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            ROS_APT_MIRROR=tsinghua
            # 从同一个 workflow 的 build-runtime 输出拉 runtime image (for same arch)
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/ega-uav-runtime:${{ needs.build-runtime.outputs.runtime-tag }}

      - name: Image digest
        if: steps.meta.outputs.digest
        run: |
          echo "Dev image pushed: ghcr.io/${{ github.repository_owner }}/ega-uav-build@${{ steps.meta.outputs.digest }}"
